<!DOCTYPE html>
<html>
<head>
  <title>buysastawithsaiful</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #000, #333);
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    /* Banner */
    .banner img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* Cards layout */
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 10px;
    }

    /* Laptop */
    @media (min-width: 900px) {
      .container {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,150,255,0.6);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    /* Login button */
    .login-btn {
      margin-top: 10px;
      padding: 8px 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Popup */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .popup-box {
      background: white;
      padding: 20px;
      margin: 100px auto;
      width: 250px;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }

  </style>
</head>

<body>

<header>
  <h1>buysastawithsaiful 😎</h1>
  <p>Best Clothes Under Your Budget</p>
  <button class="login-btn" onclick="openLogin()">Login</button>
</header>

<!-- Banner -->
<div class="banner">
  <img src="images/banner.jpg">
</div>

<h2>Select Your Budget</h2>

<div class="container">

  <div class="card">
    <img src="images/ph1.jpg">
    <p>Under ₹100</p>
    <p class="price">₹99</p>
  </div>

  <div class="card">
    <img src="images/ph2.jpg">
    <p>Under ₹200</p>
    <p class="price">₹199</p>
  </div>

  <div class="card">
    <img src="images/ph3.jpg">
    <p>Under ₹300</p>
    <p class="price">₹299</p>
  </div>

  <div class="card">
    <img src="images/ph4.jpg">
    <p>Under ₹400</p>
    <p class="price">₹399</p>
  </div>

  <div class="card">
    <img src="images/ph5.jpg">
    <p>Under ₹500</p>
    <p class="price">₹499</p>
  </div>

  <div class="card">
    <img src="images/ph6.jpg">
    <p>Under ₹600</p>
    <p class="price">₹599</p>
  </div>

</div>

<!-- Login Popup -->
<div class="popup" id="loginPopup">
  <div class="popup-box">
    <h3>Login</h3>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<script>
function openLogin() {
  document.getElementById("loginPopup").style.display = "block";
}

function closeLogin() {
  document.getElementById("loginPopup").style.display = "none";
}

function login() {
  alert("Login successful 😎 (Demo)");
  closeLogin();
}
</script>

</body>
</html>
